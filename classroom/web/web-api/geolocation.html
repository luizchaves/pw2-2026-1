<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geolocation API</title>
    <style>
      /* body {
        font-family: sans-serif;
        max-width: 600px;
        margin: 2rem auto;
        padding: 0 1rem;
      } */

      #info {
        margin-top: 1rem;
        padding: 1rem;
        /* border: 1px solid #ccc;
        border-radius: 8px;
        background: #f9f9f9; */
      }

      button {
        padding: 0.5rem 1rem;
        font-size: 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Geolocation API</h1>
    <button id="btn">Obter Localização</button>
    <div id="info"></div>

    <script>
      const btn = document.querySelector('#btn');
      const info = document.querySelector('#info');

      btn.addEventListener('click', () => {
        if (!navigator.geolocation) {
          info.textContent = 'Geolocation não é suportado pelo navegador.';
          return;
        }

        info.textContent = 'Obtendo localização...';

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const { latitude, longitude, accuracy } = position.coords;

            const mapSrc = `https://www.openstreetmap.org/export/embed.html?bbox=${longitude - 0.01},${latitude - 0.01},${longitude + 0.01},${latitude + 0.01}&layer=mapnik&marker=${latitude},${longitude}`;

            info.innerHTML = `
              <p><strong>Latitude:</strong> ${latitude}</p>
              <p><strong>Longitude:</strong> ${longitude}</p>
              <p><strong>Precisão:</strong> ${accuracy.toFixed(0)} metros</p>
              <p>
                <a
                  href="https://www.google.com/maps?q=${latitude},${longitude}"
                  target="_blank"
                >
                  Ver no Google Maps
                </a>
              </p>
              <iframe
                src="${mapSrc}"
                width="100%"
                height="400"
                style="border: none; border-radius: 8px; margin-top: 0.5rem;"
              ></iframe>
            `;
          },
          (error) => {
            const messages = {
              1: 'Permissão negada.',
              2: 'Localização indisponível.',
              3: 'Tempo esgotado.',
            };

            info.textContent = messages[error.code] || 'Erro desconhecido.';
          }
        );
      });
    </script>
  </body>
</html>
