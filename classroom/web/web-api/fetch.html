<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fetch API</title>
    <style>
      button {
        padding: 0.5rem 1rem;
        font-size: 1rem;
        cursor: pointer;
        margin-right: 0.5rem;
      }

      #result {
        margin-top: 1rem;
        padding: 1rem;
        border: 1px solid #ccc;
        border-radius: 8px;
        min-height: 50px;
      }

      .user-card {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.5rem 0;
        border-bottom: 1px solid #eee;
      }

      .user-card img {
        width: 48px;
        height: 48px;
        border-radius: 50%;
      }

      #loading {
        color: #888;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <h1>Fetch API</h1>

    <button id="usersBtn">Buscar Usuários</button>
    <button id="postBtn">Enviar POST</button>
    <div id="result"><p>Clique em um botão para fazer uma requisição.</p></div>

    <script>
      const usersBtn = document.querySelector('#usersBtn');
      const postBtn = document.querySelector('#postBtn');
      const result = document.querySelector('#result');

      usersBtn.addEventListener('click', async () => {
        result.innerHTML = '<p id="loading">Carregando...</p>';

        try {
          const response = await fetch(
            'https://jsonplaceholder.typicode.com/users'
          );

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const users = await response.json();

          result.innerHTML = users
            .slice(0, 5)
            .map(
              (user) => `
              <div class="user-card">
                <img src="https://i.pravatar.cc/48?u=${user.id}" alt="avatar" />
                <div>
                  <strong>${user.name}</strong>
                  <br />
                  <small>${user.email}</small>
                </div>
              </div>
            `
            )
            .join('');
        } catch (err) {
          result.innerHTML = `<p style="color: #e74c3c;">Erro: ${err.message}</p>`;
        }
      });

      postBtn.addEventListener('click', async () => {
        result.innerHTML = '<p id="loading">Enviando...</p>';

        try {
          const response = await fetch(
            'https://jsonplaceholder.typicode.com/posts',
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                title: 'Meu Post',
                body: 'Conteúdo enviado via Fetch API',
                userId: 1,
              }),
            }
          );

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();

          result.innerHTML = `
            <p><strong>Post criado com sucesso!</strong></p>
            <p><strong>ID:</strong> ${data.id}</p>
            <p><strong>Título:</strong> ${data.title}</p>
            <p><strong>Corpo:</strong> ${data.body}</p>
          `;
        } catch (err) {
          result.innerHTML = `<p style="color: #e74c3c;">Erro: ${err.message}</p>`;
        }
      });
    </script>
  </body>
</html>
