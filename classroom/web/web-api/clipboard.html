<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clipboard API</title>
    <style>
      textarea {
        width: 100%;
        max-width: 500px;
        height: 100px;
        font-size: 1rem;
        padding: 0.5rem;
        display: block;
        margin-bottom: 0.5rem;
      }

      button {
        padding: 0.5rem 1rem;
        font-size: 1rem;
        cursor: pointer;
        margin-right: 0.5rem;
      }

      #status {
        margin-top: 1rem;
        padding: 0.5rem;
        color: #2ecc71;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Clipboard API</h1>

    <textarea id="input" placeholder="Digite algo aqui..."></textarea>
    <div>
      <button id="copyBtn">Copiar</button>
      <button id="pasteBtn">Colar</button>
    </div>
    <p id="status"></p>
    <p id="pasted"></p>

    <script>
      const input = document.querySelector('#input');
      const copyBtn = document.querySelector('#copyBtn');
      const pasteBtn = document.querySelector('#pasteBtn');
      const status = document.querySelector('#status');
      const pasted = document.querySelector('#pasted');

      copyBtn.addEventListener('click', async () => {
        const text = input.value;

        if (!text) {
          status.textContent = 'Nada para copiar.';
          return;
        }

        try {
          await navigator.clipboard.writeText(text);
          status.textContent = 'Texto copiado!';
        } catch (err) {
          status.textContent = 'Erro ao copiar: ' + err.message;
        }
      });

      pasteBtn.addEventListener('click', async () => {
        try {
          const text = await navigator.clipboard.readText();
          pasted.innerHTML = `<strong>Texto colado:</strong> ${text}`;
        } catch (err) {
          status.textContent = 'Erro ao colar: ' + err.message;
        }
      });
    </script>
  </body>
</html>
